<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix | Find Donor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="bg-rose-600 p-6 text-white rounded-b-[2rem] shadow-lg flex items-center gap-4">
    <a href="index.html" class="text-2xl hover:opacity-80 transition">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="text-xl font-bold">Find Blood Donor</h1> </div>

    <div class="p-6 max-w-2xl mx-auto">

        <div class="bg-white p-5 rounded-3xl shadow-md border border-rose-100 mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-rose-600 font-bold text-[10px] uppercase tracking-wider animate-pulse">● Urgent Help Needed</h2>
                <h3 id="urgentBloodGroup" class="text-2xl font-black text-gray-800 leading-tight">AB+ Positive</h3>
                <p class="text-gray-500 text-[11px] font-semibold">
                    <span id="urgentPatientName">Patient Name</span> @ <span id="urgentHospital">General Hospital (Yangon)</span>
                </p>
                <p id="urgentLocation" class="text-gray-400 text-[9px] uppercase mt-1">Yangon</p>
            </div>
            <a id="urgentCall" href="tel:09123456789" class="bg-rose-600 text-white px-5 py-2 rounded-2xl font-bold text-sm shadow-md active:scale-95 transition">Call</a>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-md mb-8">
            <label class="block text-gray-600 font-bold mb-2 text-sm">Select Blood Group</label>
            <div class="flex gap-3">
                <select id="bloodSelect" class="flex-1 p-4 bg-gray-50 border-2 border-transparent rounded-2xl outline-none focus:border-rose-500 transition shadow-inner text-sm font-semibold">
                    <option value="all">All Groups</option>
                    <option value="A+">A+</option>
                    <option value="B+">B+</option>
                    <option value="O+">O+</option>
                    <option value="AB+">AB+</option>
                </select>
                <button onclick="searchDonors()" class="bg-rose-600 text-white px-8 rounded-2xl font-bold text-sm active:scale-95 transition shadow-lg">
                    SEARCH
                </button>
            </div>
        </div>

        <h3 class="text-gray-400 font-bold mb-4 px-2 italic text-[11px] uppercase tracking-widest">Available Donors</h3>
        <div id="donorList" class="space-y-4 pb-10"></div>
    </div>

    <script>
        // Default static donor list
        const donors = [
            { name: "Daw Sein", group: "O+", location: "Yangon", phone: "09793999754", lastDonated: "12 Mar 2026" },
            { name: "Daw Phyu", group: "A+", location: "Mandalay", phone: "09667990246", lastDonated: "05 Feb 2026" },
            { name: "Daw Nyo", group: "B+", location: "Yangon", phone: "09778998565", lastDonated: "20 Jan 2026" },
            { name: "Daw Mya", group: "AB+", location: "Yangon", phone: "09264108827", lastDonated: "15 Dec 2025" },
        ];

        function searchDonors() {
            const selectElement = document.getElementById('bloodSelect');
            const listContainer = document.getElementById('donorList');

            if (!selectElement || !listContainer) return;

            const selectedGroup = selectElement.value;
            listContainer.innerHTML = ""; 

            // Get registered donors from localStorage
            const registeredDonors = JSON.parse(localStorage.getItem('donors')) || [];
            
            // Combine default list and new registrations
            const allDonors = [...donors, ...registeredDonors];

            // Filter by blood group
            const filtered = allDonors.filter(d => selectedGroup === "all" || d.group === selectedGroup);

            if (filtered.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-400 py-10 text-sm font-bold">No donors found.</p>';
                return;
            }

            filtered.forEach(donor => {
                // Ensure date shows correctly by checking both possible keys (lastDonated or date)
                const dateDisplay = donor.lastDonated || donor.date || "Not recorded";

                listContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center mb-4 transition hover:shadow-md">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="bg-rose-100 text-rose-600 font-bold px-3 py-1 rounded-xl text-[10px]">${donor.group}</span>
                                <h4 class="font-bold text-gray-800 text-sm">${donor.name}</h4>
                            </div>
                            <p class="text-gray-400 text-[11px] mt-1">📍 ${donor.location}</p>
                            <p class="text-rose-500 text-[10px] font-bold mt-1">
                                <i class="fas fa-calendar-alt"></i> Last Donated: ${dateDisplay}
                            </p>
                        </div>
                        <a href="tel:${donor.phone}" class="bg-green-500 text-white w-10 h-10 rounded-full shadow-lg active:scale-90 transition flex items-center justify-center">
                            <i class="fas fa-phone-alt text-sm"></i>
                        </a>
                    </div>`;
            });
        }

        function displayUrgent() {
            const urgentData = JSON.parse(localStorage.getItem('urgentRequest'));
            if (urgentData) {
                document.getElementById('urgentBloodGroup').innerText = urgentData.bloodGroup + " Positive";
                document.getElementById('urgentPatientName').innerText = urgentData.patientName;
                document.getElementById('urgentHospital').innerText = urgentData.hospital;
                document.getElementById('urgentLocation').innerText = urgentData.location;
                document.getElementById('urgentCall').href = "tel:" + urgentData.phone;
            }
        }

        // Run functions on page load
        window.onload = function() {
            searchDonors();
            displayUrgent();
        };
    </script>
</body>
</html>
